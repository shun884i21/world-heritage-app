<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f6f54" />
  <title>世界遺産ずかん</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>🌏 世界遺産ずかん</h1>
    <p class="sub" id="headerSub">全 <span id="totalCount">—</span> 件を検索・閲覧</p>
  </header>

  <main id="main">
    <!-- ===== 検索タブ ===== -->
    <section id="tab-search" class="tab active">
      <div class="search-box">
        <input type="search" id="q" placeholder="遺産名・国名で検索…" autocomplete="off" />
      </div>

      <div class="filters">
        <div class="filter-group" id="typeFilters">
          <span class="filter-label">分類</span>
          <button class="chip" data-type="cultural">🏛 文化</button>
          <button class="chip" data-type="natural">🌲 自然</button>
          <button class="chip" data-type="mixed">🔆 複合</button>
        </div>
        <div class="filter-group">
          <span class="filter-label">条件</span>
          <button class="chip" id="dangerChip" data-danger="1">⚠️ 危機遺産</button>
          <button class="chip" id="collectedChip" data-collected="1">✅ 閲覧済み</button>
          <button class="chip" id="wishChip" data-wish="1">⭐ 行きたい</button>
        </div>
        <div class="filter-group">
          <span class="filter-label">国・地域</span>
          <select id="regionSelect">
            <option value="">地域すべて</option>
          </select>
          <select id="countrySelect">
            <option value="">国すべて</option>
          </select>
          <select id="sortSelect">
            <option value="name">名前順</option>
            <option value="year_desc">登録新しい順</option>
            <option value="year_asc">登録古い順</option>
          </select>
        </div>
        <button class="reset-btn" id="resetBtn">クリア</button>
      </div>

      <p class="result-count"><span id="resultCount">0</span> 件</p>
      <div id="list" class="card-grid"></div>
      <div id="sentinel"></div>
    </section>

    <!-- ===== 統計・うんちくタブ ===== -->
    <section id="tab-stats" class="tab">
      <div id="statsContent"></div>
    </section>

    <!-- ===== コレクションタブ ===== -->
    <section id="tab-collection" class="tab">
      <div id="collectionContent"></div>
    </section>
  </main>

  <!-- ===== 詳細モーダル ===== -->
  <div id="detail" class="detail-overlay" hidden>
    <div class="detail-card">
      <button class="detail-close" id="detailClose" aria-label="閉じる">×</button>
      <div id="detailBody"></div>
    </div>
  </div>

  <nav class="tabbar">
    <button class="tabbtn active" data-tab="search"><span>🔍</span>さがす</button>
    <button class="tabbtn" data-tab="stats"><span>📊</span>統計・うんちく</button>
    <button class="tabbtn" data-tab="collection"><span>🏆</span>コレクション</button>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>
